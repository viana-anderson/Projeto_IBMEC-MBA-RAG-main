# ============================================================
# docker-compose.yml — Stack RAG Jurídico Completa
# MBA RAG & CAG · Aula 12 — Projeto Final
# ============================================================
# Uso:
#   docker compose up -d           (iniciar todos os serviços)
#   docker compose logs -f rag-api (acompanhar logs da API)
#   docker compose down            (encerrar)
#
# Pré-requisito: criar arquivo .env com as variáveis abaixo.
# Template: copie .env.example para .env e preencha.

version: "3.8"

services:

  # ---- OpenSearch: Vector DB + BM25 ----
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Admin@RAG1234!
      - plugins.security.disabled=true          # SOMENTE DESENVOLVIMENTO
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "9200:9200"
      - "9600:9600"                             # Performance analyzer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - rag_network
    restart: unless-stopped

  # ---- OpenSearch Dashboards ----
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped

  # ---- API RAG (FastAPI) ----
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASS=Admin@RAG1234!
      - OPENSEARCH_INDEX=rag_juridico_v1
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_HOST=http://langfuse-server:3000
      - API_KEYS=${API_KEYS:-dev-key-mba-2024}
      - LLM_MODEL=gpt-4o-mini
      - EMBED_MODEL=text-embedding-3-small
    ports:
      - "8000:8000"
    depends_on:
      opensearch:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rag_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- LangFuse Database (PostgreSQL) ----
  langfuse-db:
    image: postgres:15-alpine
    container_name: langfuse-db
    environment:
      - POSTGRES_USER=langfuse
      - POSTGRES_PASSWORD=langfuse_secret_2024
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_db_data:/var/lib/postgresql/data
    networks:
      - rag_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- LangFuse Server ----
  langfuse-server:
    image: langfuse/langfuse:latest
    container_name: langfuse-server
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse_secret_2024@langfuse-db:5432/langfuse
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET:-mude_este_secret_em_producao}
      - SALT=${LANGFUSE_SALT:-mude_este_salt_em_producao}
      - LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES=true
    ports:
      - "3000:3000"
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - rag_network
    restart: unless-stopped

volumes:
  opensearch_data:
    driver: local
  langfuse_db_data:
    driver: local

networks:
  rag_network:
    driver: bridge
